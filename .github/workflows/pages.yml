name: Deploy to GitHub Pages

on:
  # Erlaubt das manuelle Starten über das Interface "Actions"
  workflow_dispatch:
  push:
    branches:
      - "main"
  workflow_run:
    workflows: ["Import data from n8n-workflow-results"]
    types:
      - completed
    branches:
      - main


# Notwendige Berechtigungen, um mit GitHub Pages interagieren zu dürfen
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate data/index.json
        run: node generate_index.js

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Wir laden den kompletten Ordner hoch
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4